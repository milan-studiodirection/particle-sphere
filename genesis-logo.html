    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    // — Config —
    const numParticles   = LOGO_POINTS.length;
    const fov            = 800;
    const minSize        = 1.0;
    const maxSize        = 3.0;
    const driftSpeed     = 0.3;
    const baseLifespan   = 4;
    const repelRadius    = 140;
    const repelStrength  = 2.0;
    const springStrength = 0.035;
    const maxDrift       = 12; // max pixels a particle can drift from origin

    const mouse = { x: null, y: null };

    // Blur dot
    const blurCanvas = document.createElement('canvas');
    blurCanvas.width = blurCanvas.height = 64;
    const blurCtx = blurCanvas.getContext('2d');
    const bc = 32;
    const g = blurCtx.createRadialGradient(bc,bc,0,bc,bc,bc);
    g.addColorStop(0,   'rgba(255,255,255,1)');
    g.addColorStop(0.3, 'rgba(255,255,255,0.6)');
    g.addColorStop(1,   'rgba(255,255,255,0)');
    blurCtx.fillStyle = g;
    blurCtx.beginPath();
    blurCtx.arc(bc,bc,bc,0,Math.PI*2);
    blurCtx.fill();

    function getLogoOrigin(idx) {
      const [nx, ny] = LOGO_POINTS[idx];
      const svgAspect = 692 / 655;
      const canvasAspect = width / height;
      let scale, offsetX, offsetY;
      if (canvasAspect > svgAspect) {
        scale = height * 0.85;
        offsetX = (width - scale * svgAspect) / 2;
        offsetY = height * 0.075;
      } else {
        scale = width * 0.85 / svgAspect;
        offsetX = width * 0.075;
        offsetY = (height - scale) / 2;
      }
      return {
        x: offsetX + (nx + 1) / 2 * scale * svgAspect,
        y: offsetY + (ny + 1) / 2 * scale
      };
    }

    function resize() {
      width  = canvas.width  = canvas.offsetWidth;
      height = canvas.height = canvas.offsetHeight;
      // Update all particle origins on resize
      particles.forEach(p => {
        const pt = getLogoOrigin(p.idx);
        p.originX = pt.x;
        p.originY = pt.y;
      });
    }
    window.addEventListener('resize', resize);

    window.addEventListener('mousemove', e => {

      mouse.x = e.clientX - r.left;
      mouse.y = e.clientY - r.top;
    });
    window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

    const particles = [];

    class Particle {
      constructor(idx, isInitial = false) {
        this.idx = idx;
        this.isOutline = LOGO_POINTS[idx][2] === 1;
        this.init();
        if (isInitial) this.life = Math.random() * this.maxLife;
      }
      init() {
        this.maxLife = (baseLifespan * 60) + Math.random() * 90;
        this.life = 0;

        const pt = getLogoOrigin(this.idx);
        this.originX = pt.x;
        this.originY = pt.y;
        this.originZ = 0;

        // Spawn at origin with tiny scatter
        const scatter = this.isOutline ? 3 : 6;
        this.x = pt.x + (Math.random() - 0.5) * scatter;
        this.y = pt.y + (Math.random() - 0.5) * scatter;
        this.z = (Math.random() - 0.5) * 40;

        // Random drift direction
        this.baseVx = (Math.random() - 0.5) * driftSpeed;
        this.baseVy = (Math.random() - 0.5) * driftSpeed;
        this.baseVz = (Math.random() - 0.5) * driftSpeed * 0.5;

        this.vx = 0; this.vy = 0; this.vz = 0;
        this.sizeFactor = Math.random();
        // Outline particles slightly larger and less blurred
        this.isBlurred = this.isOutline ? Math.random() < 0.15 : Math.random() < 0.4;
      }
      update(dt) {
        this.life += dt;
        if (this.life >= this.maxLife) { this.init(); return; }

        // Repel
        if (mouse.x !== null) {
          const sc = fov / (fov + this.z);
          const cx = width / 2, cy = height / 2;
          const sx = cx + (this.x - cx) * sc;
          const sy = cy + (this.y - cy) * sc;
          const dx = sx - mouse.x, dy = sy - mouse.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < repelRadius*repelRadius && d2 > 0) {
            const d = Math.sqrt(d2);
            const f = ((repelRadius - d) / repelRadius) * repelStrength;
            this.vx += (dx/d)*f;
            this.vy += (dy/d)*f;
          }
        }

        // Spring back to origin
        this.vx += (this.originX - this.x) * springStrength;
        this.vy += (this.originY - this.y) * springStrength;
        this.vz += (this.originZ - this.z) * springStrength;

        // Apply drift + velocity
        this.x += (this.baseVx + this.vx) * dt;
        this.y += (this.baseVy + this.vy) * dt;
        this.z += (this.baseVz + this.vz) * dt;

        this.vx *= 0.88; this.vy *= 0.88; this.vz *= 0.88;
      }
      draw() {
        const sc = fov / (fov + this.z);
        const cx = width / 2, cy = height / 2;
        const sx = cx + (this.x - cx) * sc;
        const sy = cy + (this.y - cy) * sc;

        const op = Math.sin((this.life / this.maxLife) * Math.PI);
        // Outline particles slightly brighter
        const finalOp = this.isOutline ? Math.min(op * 1.3, 1) : op * 0.85;

        const sizeMin = this.isOutline ? minSize * 1.2 : minSize * 0.7;
        const sizeMax = this.isOutline ? maxSize * 1.1 : maxSize * 0.8;
        const as = sizeMin + this.sizeFactor * (sizeMax - sizeMin);

        ctx.globalAlpha = finalOp;
        if (this.isBlurred) {
          const ds = as * sc * 5;
          ctx.drawImage(blurCanvas, sx-ds/2, sy-ds/2, ds, ds);
        } else {
          ctx.beginPath();
          ctx.arc(sx, sy, as * sc, 0, Math.PI*2);
          ctx.fillStyle = '#fff';
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
    }

    // Init after first resize
    width  = canvas.width  = canvas.offsetWidth  || 800;
    height = canvas.height = canvas.offsetHeight || 600;

    for (let i = 0; i < numParticles; i++) particles.push(new Particle(i, true));
    resize();

    let lastTime = 0;
    function animate(time) {
      if (!lastTime) lastTime = time;
      const dt = Math.min((time - lastTime) / 16.666, 3);
      lastTime = time;
      ctx.clearRect(0, 0, width, height);
      particles.sort((a, b) => b.z - a.z);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update(dt);
        particles[i].draw();
      }
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
