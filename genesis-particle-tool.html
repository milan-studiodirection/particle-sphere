<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis Particle Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
    }
    canvas {
      display: block; position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    /* Checkerboard shown when bg is transparent */
    body.transparent-bg::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(45deg, #333 25%, transparent 25%),
        linear-gradient(-45deg, #333 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #333 75%),
        linear-gradient(-45deg, transparent 75%, #333 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: #222;
      pointer-events: none;
    }
    canvas { z-index: 1; }
    .controls {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(20px);
      padding: 20px 24px; border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; gap: 20px; z-index: 10;
      width: 95%; max-width: 1500px;
      flex-wrap: wrap; justify-content: center; align-items: flex-start;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #eee;
    }
    .divider { width: 1px; background: rgba(255,255,255,0.1); align-self: stretch; }
    .checkbox-group {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 8px; min-width: 300px;
    }
    .checkbox-item {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 13px; user-select: none;
    }
    .checkbox-item input { cursor: pointer; width: 16px; height: 16px; accent-color: #fff; }
    .control-group { display: flex; flex-direction: column; gap: 8px; min-width: 100px; flex: 1; }
    .size-stack { display: flex; flex-direction: column; gap: 6px; }
    .size-row { display: flex; align-items: center; gap: 8px; }
    .size-label { font-size: 9px; text-transform: uppercase; opacity: 0.5; width: 24px; }
    input[type="number"] {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; outline: none; width: 60px;
    }
    input[type="number"]:focus { border-color: rgba(255,255,255,0.5); }
    label.title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em;
      opacity: 0.4; margin-bottom: 2px; font-weight: 700;
      display: flex; justify-content: space-between;
    }
    .value-display { opacity: 0.8; letter-spacing: 0; font-family: monospace; }
    input[type="range"] {
      cursor: pointer; accent-color: #fff; width: 100%; height: 4px;
      background: rgba(255,255,255,0.1); border-radius: 2px;
      appearance: none; -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; background: white; border-radius: 50%;
    }

    /* ── Color pickers ── */
    .color-group { display: flex; flex-direction: column; gap: 10px; min-width: 130px; }
    .color-row { display: flex; flex-direction: column; gap: 6px; }
    .color-row label.title { margin-bottom: 0; }
    .color-input-row { display: flex; align-items: center; gap: 8px; }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      cursor: pointer; flex-shrink: 0;
      position: relative; overflow: hidden;
      transition: border-color 0.15s, opacity 0.15s;
    }
    .color-swatch:hover { border-color: rgba(255,255,255,0.6); }
    .color-swatch.disabled { opacity: 0.3; pointer-events: none; }
    .color-swatch input[type="color"] {
      position: absolute; top: -4px; left: -4px;
      width: calc(100% + 8px); height: calc(100% + 8px);
      opacity: 0; cursor: pointer; border: none; padding: 0;
    }
    .hex-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 4px 8px;
      border-radius: 4px; font-size: 12px;
      font-family: monospace; outline: none;
      width: 80px; letter-spacing: 0.05em;
      transition: opacity 0.15s;
    }
    .hex-input:focus { border-color: rgba(255,255,255,0.5); }
    .hex-input.disabled { opacity: 0.3; pointer-events: none; }

    /* Transparent toggle */
    .toggle-row {
      display: flex; align-items: center; gap: 8px; margin-top: 2px;
    }
    .toggle-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em;
      opacity: 0.5; user-select: none; cursor: pointer;
    }
    .toggle {
      position: relative; width: 32px; height: 18px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; cursor: pointer;
      background: rgba(255,255,255,0.15); border-radius: 18px;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 12px; height: 12px; border-radius: 50%;
      left: 3px; top: 3px; background: #fff;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: rgba(255,255,255,0.5); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(14px); }

    /* ── Export ── */
    .export-group { display: flex; flex-direction: column; gap: 8px; min-width: 140px; }
    .res-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .res-btn {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      color: #eee; font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
      padding: 6px 4px; border-radius: 8px; cursor: pointer; text-align: center;
      transition: background 0.15s, border-color 0.15s; user-select: none;
    }
    .res-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.35); }
    .res-btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.6); color: #fff; }
    .export-btn {
      margin-top: 2px; background: #fff; color: #111; border: none;
      border-radius: 8px; padding: 9px 12px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .export-btn:hover { opacity: 0.85; }
    .export-btn:active { transform: scale(0.97); }
    .export-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ── Toast ── */
    #toast {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: rgba(20,20,20,0.95); color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px; padding: 10px 20px; border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.12); z-index: 100;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="toast"></div>

  <div class="controls">

    <!-- Shapes -->
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox" data-idx="0" checked> Product 1</label>
      <label class="checkbox-item"><input type="checkbox" data-idx="1"> Product 2</label>
      <label class="checkbox-item"><input type="checkbox" data-idx="2"> Product 3</label>
      <label class="checkbox-item"><input type="checkbox" data-idx="3"> Product 4</label>
      <label class="checkbox-item"><input type="checkbox" data-idx="4"> Product 5</label>
      <label class="checkbox-item"><input type="checkbox" data-idx="5"> Product 6</label>
    </div>

    <div class="divider"></div>

    <!-- Sliders -->
    <div class="control-group">
      <label class="title" for="particleLimit">Dot Count <span id="limitVal" class="value-display">8000</span></label>
      <input type="range" id="particleLimit" min="1000" max="15000" step="100" value="8000">
    </div>
    <div class="control-group">
      <label class="title" for="birthRate">Spawn Speed</label>
      <input type="range" id="birthRate" min="5" max="500" value="150">
    </div>
    <div class="control-group">
      <label class="title" for="lifespan">Lifespan</label>
      <input type="range" id="lifespan" min="20" max="600" value="180">
    </div>
    <div class="control-group">
      <label class="title" for="floatStrength">Float</label>
      <input type="range" id="floatStrength" min="0" max="100" value="12">
    </div>
    <div class="control-group">
      <label class="title">Dot Size</label>
      <div class="size-stack">
        <div class="size-row"><span class="size-label">Min</span><input type="number" id="minSize" value="0.8" step="0.1" min="0.1"></div>
        <div class="size-row"><span class="size-label">Max</span><input type="number" id="maxSize" value="1.8" step="0.1" min="0.1"></div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Colors -->
    <div class="color-group">
      <div class="color-row">
        <label class="title">Background</label>
        <div class="color-input-row">
          <div class="color-swatch" id="bgSwatch">
            <input type="color" id="bgColor" value="#020202">
          </div>
          <input type="text" class="hex-input" id="bgHex" value="#020202" maxlength="7" spellcheck="false">
        </div>
        <div class="toggle-row">
          <label class="toggle" for="transparentToggle">
            <input type="checkbox" id="transparentToggle">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label" style="cursor:pointer" onclick="document.getElementById('transparentToggle').click()">Transparent</span>
        </div>
      </div>
      <div class="color-row">
        <label class="title">Dot Color</label>
        <div class="color-input-row">
          <div class="color-swatch" id="dotSwatch">
            <input type="color" id="dotColor" value="#ffffff">
          </div>
          <input type="text" class="hex-input" id="dotHex" value="#ffffff" maxlength="7" spellcheck="false">
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Export -->
    <div class="export-group">
      <label class="title">Export PNG</label>
      <div class="res-buttons">
        <div class="res-btn" data-w="1920" data-h="1920">1920²</div>
        <div class="res-btn active" data-w="1920" data-h="1080">1080p</div>
        <div class="res-btn" data-w="3840" data-h="2160">4K</div>
        <div class="res-btn" data-w="7680" data-h="4320">8K</div>
      </div>
      <button class="export-btn" id="exportBtn">⬇ Export</button>
    </div>

  </div>

  <script>
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const toast   = document.getElementById('toast');

    let bgColorVal      = '#020202';
    let dotColorVal     = '#ffffff';
    let isTransparent   = false;

    // ── Helpers ──────────────────────────────────────────────
    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1,3),16),
        g: parseInt(hex.slice(3,5),16),
        b: parseInt(hex.slice(5,7),16)
      };
    }
    function isValidHex(h) { return /^#[0-9a-fA-F]{6}$/.test(h); }

    // ── Color picker setup ───────────────────────────────────
    function setupColorPicker(colorInputId, hexInputId, swatchId, onUpdate) {
      const colorInput = document.getElementById(colorInputId);
      const hexInput   = document.getElementById(hexInputId);
      const swatch     = document.getElementById(swatchId);

      function applyColor(hex) {
        colorInput.value        = hex;
        hexInput.value          = hex;
        swatch.style.background = hex;
        onUpdate(hex);
      }

      colorInput.addEventListener('input', () => applyColor(colorInput.value));

      hexInput.addEventListener('input', () => {
        let val = hexInput.value.trim();
        if (!val.startsWith('#')) val = '#' + val;
        hexInput.value = val;
        if (isValidHex(val)) applyColor(val);
      });
      hexInput.addEventListener('blur', () => {
        if (!isValidHex(hexInput.value)) hexInput.value = colorInput.value;
      });

      swatch.style.background = colorInput.value;
    }

    setupColorPicker('bgColor',  'bgHex',  'bgSwatch',  hex => { bgColorVal  = hex; });
    setupColorPicker('dotColor', 'dotHex', 'dotSwatch', hex => { dotColorVal = hex; });

    // ── Transparent toggle ───────────────────────────────────
    const transparentToggle = document.getElementById('transparentToggle');
    const bgSwatch          = document.getElementById('bgSwatch');
    const bgHexInput        = document.getElementById('bgHex');

    transparentToggle.addEventListener('change', () => {
      isTransparent = transparentToggle.checked;

      // Show checkerboard preview on body
      document.body.classList.toggle('transparent-bg', isTransparent);

      // Disable/enable bg picker visually
      bgSwatch.classList.toggle('disabled', isTransparent);
      bgHexInput.classList.toggle('disabled', isTransparent);
    });

3.5Z"/></svg>`
    ];

    const birthRateInput     = document.getElementById('birthRate');
    const lifespanInput      = document.getElementById('lifespan');
    const floatStrengthInput = document.getElementById('floatStrength');
    const minSizeInput       = document.getElementById('minSize');
    const maxSizeInput       = document.getElementById('maxSize');
    const particleLimitInput = document.getElementById('particleLimit');
    const limitValDisplay    = document.getElementById('limitVal');
    const checkInputs        = document.querySelectorAll('.checkbox-item input');
    const exportBtn          = document.getElementById('exportBtn');
    const resBtns            = document.querySelectorAll('.res-btn');

    let particles     = [];
    let width, height, centerX, centerY;
    let validPoints   = [];
    let productImages = [];
    let selectedRes   = { w: 1920, h: 1080 };
    let toastTimer;

    // ── Resolution picker ────────────────────────────────────
    resBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        resBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRes = { w: parseInt(btn.dataset.w), h: parseInt(btn.dataset.h) };
      });
    });

    // ── Toast ────────────────────────────────────────────────
    function showToast(msg, duration = 2800) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    // ── Export ───────────────────────────────────────────────
    exportBtn.addEventListener('click', () => {
      if (!validPoints.length) { showToast('⚠ No shape active.'); return; }
      exportBtn.disabled = true;
      const label = isTransparent ? 'transparent PNG' : `${selectedRes.w}×${selectedRes.h}`;
      showToast(`Rendering ${label}…`, 5000);

      setTimeout(() => {
        const ew = selectedRes.w, eh = selectedRes.h;
        const scale = Math.min(ew / width, eh / height);
        const ox = (ew - width  * scale) / 2;
        const oy = (eh - height * scale) / 2;

        const ec   = document.createElement('canvas');
        ec.width   = ew; ec.height = eh;
        const ectx = ec.getContext('2d');

        if (!isTransparent) {
          ectx.fillStyle = bgColorVal;
          ectx.fillRect(0, 0, ew, eh);
        }
        // transparent: skip fill — canvas default is transparent

        const { r, g, b } = hexToRgb(dotColorVal);
        particles.forEach(p => {
          if (p.opacity <= 0) return;
          ectx.globalAlpha = p.opacity;
          ectx.fillStyle   = `rgb(${r},${g},${b})`;
          ectx.beginPath();
          ectx.arc(ox + p.x * scale, oy + p.y * scale, Math.max(0.5, p.size * scale), 0, Math.PI * 2);
          ectx.fill();
        });
        ectx.globalAlpha = 1;

        const activeIdx = [...checkInputs].findIndex(i => i.checked);
        const shapeLabel = activeIdx >= 0 ? `product-${activeIdx + 1}` : 'shape';
        const suffix     = isTransparent ? 'transparent' : `${ew}x${eh}`;
        const filename   = `genesis-${shapeLabel}-${suffix}.png`;

        ec.toBlob(blob => {
          const a  = document.createElement('a');
          a.href   = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
          exportBtn.disabled = false;
          showToast(`✓ Saved: ${filename}`);
        }, 'image/png');
      }, 60);
    });

    // ── Canvas resize ────────────────────────────────────────
    function resize() {
      width   = canvas.width  = window.innerWidth;
      height  = canvas.height = window.innerHeight;
      centerX = width / 2; centerY = height / 2;
      if (productImages.length === 6) processShapes();
    }
    window.addEventListener('resize', resize);

    // ── Shape sampling ───────────────────────────────────────
    function processShapes() {
      validPoints = [];
      const tc  = document.createElement('canvas');
      const tx  = tc.getContext('2d');
      const res = 1000;
      tc.width  = tc.height = res;
      const displayScale = Math.min(width, height) * 0.75;
      checkInputs.forEach((input, i) => {
        if (!input.checked || !productImages[i]) return;
        tx.clearRect(0, 0, res, res);
        tx.drawImage(productImages[i], 0, 0, res, res);
        const data = tx.getImageData(0, 0, res, res).data;
        for (let y = 0; y < res; y += 2)
          for (let x = 0; x < res; x += 2)
            if (data[(y * res + x) * 4 + 3] > 100)
              validPoints.push({
                x: (x / res - 0.5) * displayScale + centerX,
                y: (y / res - 0.5) * displayScale + centerY
              });
      });
    }

    checkInputs.forEach(input => {
      input.addEventListener('change', e => {
        if (e.target.checked) checkInputs.forEach(o => { if (o !== e.target) o.checked = false; });
        particles = [];
        processShapes();
      });
    });

    particleLimitInput.addEventListener('input', e => {
      limitValDisplay.innerText = parseInt(e.target.value).toLocaleString();
    });

    // ── Init ─────────────────────────────────────────────────
    async function init() {
      productImages = await Promise.all(svgSources.map(s => new Promise(res => {
        const img = new Image();
        img.onload = () => res(img);
        img.src = URL.createObjectURL(new Blob([s], { type: 'image/svg+xml' }));
      })));
      resize();
      animate();
    }

    // ── Particle ─────────────────────────────────────────────
    class Particle {
      constructor(x, y) {
        this.x = x; this.y = y;
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 0.4 * (floatStrengthInput.value / 20);
        this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s;
        this.life    = 0;
        this.maxLife = parseInt(lifespanInput.value) * (0.8 + Math.random() * 0.4);
        this.opacity = 0;
        const mn = parseFloat(minSizeInput.value) || 0.1;
        const mx = parseFloat(maxSizeInput.value) || 1.0;
        this.size = mn + Math.random() * (mx - mn);
      }
      update() {
        this.life++;
        const str = floatStrengthInput.value / 100;
        this.vx += (Math.random() - 0.5) * str * 0.15;
        this.vy += (Math.random() - 0.5) * str * 0.15;
        this.x += this.vx; this.y += this.vy;
        const r = this.life / this.maxLife;
        this.opacity = r < 0.1 ? r / 0.1 : r > 0.85 ? (1 - r) / 0.15 : 1;
      }
      draw() {
        if (this.opacity <= 0) return;
        const { r, g, b } = hexToRgb(dotColorVal);
        ctx.fillStyle = `rgba(${r},${g},${b},${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function spawn() {
      if (!validPoints.length) return;
      const limit = parseInt(particleLimitInput.value);
      if (particles.length >= limit) return;
      const n = Math.min(parseInt(birthRateInput.value), limit - particles.length);
      for (let i = 0; i < n; i++) {
        const pt = validPoints[Math.floor(Math.random() * validPoints.length)];
        particles.push(new Particle(pt.x, pt.y));
      }
    }

    function animate() {
      if (isTransparent) {
        ctx.clearRect(0, 0, width, height);
      } else {
        const { r, g, b } = hexToRgb(bgColorVal);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0, 0, width, height);
      }
      spawn();
      particles = particles.filter(p => { p.update(); p.draw(); return p.life < p.maxLife; });
      requestAnimationFrame(animate);
    }

    init();
  </script>
</body>
