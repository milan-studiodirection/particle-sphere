<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis Particle Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
    .controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 15, 15, 0.92);
      backdrop-filter: blur(20px);
      padding: 24px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      gap: 24px;
      z-index: 10;
      width: 95%;
      max-width: 1200px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      min-width: 320px;
      padding-right: 20px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      user-select: none;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .checkbox-item input {
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: #fff;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 110px;
      flex: 1;
    }
    .size-stack {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .size-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .size-label {
      font-size: 9px;
      text-transform: uppercase;
      opacity: 0.5;
      width: 24px;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    input[type="number"] {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
      width: 60px;
    }
    input[type="number"]:focus {
      border-color: rgba(255, 255, 255, 0.5);
    }
    label.title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      opacity: 0.4;
      margin-bottom: 4px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .value-display {
      opacity: 0.8;
      letter-spacing: 0;
      font-family: monospace;
    }
    input[type="range"] {
      cursor: pointer;
      accent-color: #ffffff;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      appearance: none;
      -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="controls">
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox" data-idx="0" checked> Product 1</label>
      <label class="checkbox-item"><input type="checkbox" data-idx="1"> Product 2</label>
      <label class="checkbox-item"><input type="checkbox" data-idx="2"> Product 3</label>
      <label class="checkbox-item"><input type="checkbox" data-idx="3"> Product 4</label>
      <label class="checkbox-item"><input type="checkbox" data-idx="4"> Product 5</label>
      <label class="checkbox-item"><input type="checkbox" data-idx="5"> Product 6</label>
    </div>
    <div class="control-group">
      <label class="title" for="particleLimit">Dot Count <span id="limitVal" class="value-display">8000</span></label>
      <input type="range" id="particleLimit" min="1000" max="15000" step="100" value="8000">
    </div>
    <div class="control-group">
      <label class="title" for="birthRate">Spawn Speed</label>
      <input type="range" id="birthRate" min="5" max="500" value="150">
    </div>
    <div class="control-group">
      <label class="title" for="lifespan">Lifespan</label>
      <input type="range" id="lifespan" min="20" max="600" value="180">
    </div>
    <div class="control-group">
      <label class="title" for="floatStrength">Float</label>
      <input type="range" id="floatStrength" min="0" max="100" value="12">
    </div>
    <div class="control-group">
      <label class="title">Dot Size</label>
      <div class="size-stack">
        <div class="size-row">
          <span class="size-label">Min</span>
          <input type="number" id="minSize" value="0.8" step="0.1" min="0.1">
        </div>
        <div class="size-row">
          <span class="size-label">Max</span>
          <input type="number" id="maxSize" value="1.8" step="0.1" min="0.1">
        </div>
      </div>
    </div>
  </div>

3.5Z"/></svg>`
    ];

    const birthRateInput    = document.getElementById('birthRate');
    const lifespanInput     = document.getElementById('lifespan');
    const floatStrengthInput= document.getElementById('floatStrength');
    const minSizeInput      = document.getElementById('minSize');
    const maxSizeInput      = document.getElementById('maxSize');
    const particleLimitInput= document.getElementById('particleLimit');
    const limitValDisplay   = document.getElementById('limitVal');
    const checkInputs       = document.querySelectorAll('.checkbox-item input');

    let particles = [];
    let width, height, centerX, centerY;
    let validPoints = [];
    let productImages = [];

    function resize() {
      width   = canvas.width  = window.innerWidth;
      height  = canvas.height = window.innerHeight;
      centerX = width  / 2;
      centerY = height / 2;
      if (productImages.length === 6) processShapes();
    }
    window.addEventListener('resize', resize);

    function processShapes() {
      validPoints = [];
      const tempCanvas = document.createElement('canvas');
      const tempCtx    = tempCanvas.getContext('2d');
      const res        = 1000;
      tempCanvas.width = tempCanvas.height = res;
      const displayScale = Math.min(width, height) * 0.75;

      checkInputs.forEach((input, i) => {
        if (!input.checked || !productImages[i]) return;
        tempCtx.clearRect(0, 0, res, res);
        tempCtx.drawImage(productImages[i], 0, 0, res, res);
        const data = tempCtx.getImageData(0, 0, res, res).data;
        for (let y = 0; y < res; y += 2) {
          for (let x = 0; x < res; x += 2) {
            if (data[(y * res + x) * 4 + 3] > 100) {
              validPoints.push({
                x: (x / res - 0.5) * displayScale + centerX,
                y: (y / res - 0.5) * displayScale + centerY
              });
            }
          }
        }
      });
    }

    checkInputs.forEach(input => {
      input.addEventListener('change', e => {
        if (e.target.checked) {
          checkInputs.forEach(other => { if (other !== e.target) other.checked = false; });
        }
        particles = [];
        processShapes();
      });
    });

    particleLimitInput.addEventListener('input', e => {
      limitValDisplay.innerText = parseInt(e.target.value).toLocaleString();
    });

    async function init() {
      productImages = await Promise.all(svgSources.map(svgStr => new Promise(resolve => {
        const img  = new Image();
        const blob = new Blob([svgStr], { type: 'image/svg+xml' });
        img.onload = () => resolve(img);
        img.src    = URL.createObjectURL(blob);
      })));
      resize();
      animate();
    }

    class Particle {
      constructor(x, y) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 0.4 * (floatStrengthInput.value / 20);
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life    = 0;
        this.maxLife = parseInt(lifespanInput.value) * (0.8 + Math.random() * 0.4);
        this.opacity = 0;
        const minS = parseFloat(minSizeInput.value) || 0.1;
        const maxS = parseFloat(maxSizeInput.value) || 1.0;
        this.size = minS + Math.random() * (maxS - minS);
      }
      update() {
        this.life++;
        const strength = floatStrengthInput.value / 100;
        this.vx += (Math.random() - 0.5) * strength * 0.15;
        this.vy += (Math.random() - 0.5) * strength * 0.15;
        this.x += this.vx;
        this.y += this.vy;
        const r = this.life / this.maxLife;
        this.opacity = r < 0.1 ? r / 0.1 : r > 0.85 ? (1 - r) / 0.15 : 1;
      }
      draw() {
        if (this.opacity <= 0) return;
        ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function spawn() {
      if (!validPoints.length) return;
      const limit   = parseInt(particleLimitInput.value);
      if (particles.length >= limit) return;
      const toSpawn = Math.min(parseInt(birthRateInput.value), limit - particles.length);
      for (let i = 0; i < toSpawn; i++) {
        const pt = validPoints[Math.floor(Math.random() * validPoints.length)];
        particles.push(new Particle(pt.x, pt.y));
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      spawn();
      particles = particles.filter(p => { p.update(); p.draw(); return p.life < p.maxLife; });
      requestAnimationFrame(animate);
    }

    init();
  </script>
