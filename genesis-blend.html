    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    // Blend sets: [offsetX, offsetY, size, opacity]
    const SETS = [
      [  0,   0, 1.8, 1.00 ],  // Set 1 — original
      [  7,  -7, 1.4, 0.75 ],  // Set 2
      [ 14, -14, 1.0, 0.50 ],  // Set 3
      [ 20, -20, 0.45, 0.25 ], // Set 4
    ];

    const fov           = 800;
    const repelRadius   = 130;
    const repelStrength = 2.5;
    const returnSpeed   = 0.18; // how fast they snap back (0-1, higher = faster)

    const mouse = { x: null, y: null };

    function getLogoTransform() {
      const svgAspect = 692 / 655;
      const ca = width / height;
      let scale, ox, oy;
      if (ca > svgAspect) {
        scale = height * 0.85;
        ox = (width - scale * svgAspect) / 2;
        oy = height * 0.075;
      } else {
        scale = width * 0.85 / svgAspect;
        ox = width * 0.075;
        oy = (height - scale) / 2;
      }
      return { scale, ox, oy, svgAspect };
    }

    function getBasePos(idx, offsetX, offsetY) {
      const [nx, ny] = OUTLINE_POINTS[idx];
      const { scale, ox, oy, svgAspect } = getLogoTransform();
      return {
        x: ox + (nx + 1) / 2 * scale * svgAspect + offsetX,
        y: oy + (ny + 1) / 2 * scale + offsetY
      };
    }

    function resize() {
      width  = canvas.width  = canvas.offsetWidth  || 800;
      height = canvas.height = canvas.offsetHeight || 600;
      // Update all origins
      particles.forEach(p => {
        const pt = getBasePos(p.ptIdx, p.offsetX, p.offsetY);
        p.originX = pt.x;
        p.originY = pt.y;
        // Snap to origin on resize
        p.x = pt.x;
        p.y = pt.y;
      });
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      mouse.x = e.clientX - r.left;
      mouse.y = e.clientY - r.top;
    });
    window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

    const particles = [];

    class Particle {
      constructor(ptIdx, setIdx) {
        this.ptIdx   = ptIdx;
        this.setIdx  = setIdx;
        const [ox, oy, size, opacity] = SETS[setIdx];
        this.offsetX = ox;
        this.offsetY = oy;
        this.size    = size;
        this.opacity = opacity;
        this.vx = 0;
        this.vy = 0;
        this.z  = (Math.random() - 0.5) * 20; // tiny z variation for depth
        const pt = getBasePos(ptIdx, ox, oy);
        this.x = this.originX = pt.x;
        this.y = this.originY = pt.y;
      }
      update(dt) {
        // Repel from mouse
        if (mouse.x !== null) {
          const sc = fov / (fov + this.z);
          const cx = width/2, cy = height/2;
          const sx = cx + (this.x - cx) * sc;
          const sy = cy + (this.y - cy) * sc;
          const dx = sx - mouse.x, dy = sy - mouse.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < repelRadius*repelRadius && d2 > 0) {
            const d = Math.sqrt(d2);
            const f = ((repelRadius - d) / repelRadius) * repelStrength;
            this.vx += (dx/d) * f;
            this.vy += (dy/d) * f;
          }
        }

        // Snap back to origin — lerp instead of spring for crisper return
        this.vx += (this.originX - this.x) * 0.12;
        this.vy += (this.originY - this.y) * 0.12;

        this.x += this.vx * dt;
        this.y += this.vy * dt;

        this.vx *= 0.75;
        this.vy *= 0.75;
      }
      draw() {
        const sc = fov / (fov + this.z);
        const cx = width/2, cy = height/2;
        const sx = cx + (this.x - cx) * sc;
        const sy = cy + (this.y - cy) * sc;
        ctx.globalAlpha = this.opacity;
        ctx.beginPath();
        ctx.arc(sx, sy, this.size * sc, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    width  = canvas.width  = canvas.offsetWidth  || 800;
    height = canvas.height = canvas.offsetHeight || 600;

    // Create all 4 sets — draw back to front (set 4 first, set 1 last)
    for (let s = SETS.length - 1; s >= 0; s--) {
      for (let i = 0; i < OUTLINE_POINTS.length; i++) {
        particles.push(new Particle(i, s));
      }
    }

    let lastTime = 0;
    function animate(time) {
      if (!lastTime) lastTime = time;
      const dt = Math.min((time - lastTime) / 16.666, 3);
      lastTime = time;
      ctx.clearRect(0, 0, width, height);
      // Draw in order (already sorted: set4, set3, set2, set1)
      for (let i = 0; i < particles.length; i++) {
        particles[i].update(dt);
        particles[i].draw();
      }
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
