    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    // 9 sets: each one is scale factor larger than original
    // scale grows outward, dot size shrinks, opacity fades to 0
    // [scaleFactor, dotSize, opacity]
    const SETS = [
      [ 1.000, 1.8,  1.00 ],
      [ 1.012, 1.55, 0.875],
      [ 1.024, 1.30, 0.75 ],
      [ 1.036, 1.10, 0.625],
      [ 1.048, 0.90, 0.50 ],
      [ 1.060, 0.72, 0.375],
      [ 1.072, 0.55, 0.25 ],
      [ 1.084, 0.38, 0.125],
      [ 1.096, 0.22, 0.00 ],
    ];

    const fov           = 800;
    const repelRadius   = 130;
    const repelStrength = 2.5;

    const mouse = { x: null, y: null };

    function getLogoTransform() {
      const svgAspect = 692 / 655;
      const ca = width / height;
      let scale, ox, oy;
      if (ca > svgAspect) {
        scale = height * 0.85;
        ox = (width - scale * svgAspect) / 2;
        oy = height * 0.075;
      } else {
        scale = width * 0.85 / svgAspect;
        ox = width * 0.075;
        oy = (height - scale) / 2;
      }
      return { scale, ox, oy, svgAspect };
    }

    // Get base canvas position for a point, scaled around logo center
    function getBasePos(idx, scaleFactor) {
      const [nx, ny] = OUTLINE_POINTS[idx];
      const { scale, ox, oy, svgAspect } = getLogoTransform();

      // Canvas position at scale=1
      const bx = ox + (nx + 1) / 2 * scale * svgAspect;
      const by = oy + (ny + 1) / 2 * scale;

      // Logo center in canvas coords
      const cx = ox + scale * svgAspect / 2;
      const cy = oy + scale / 2;

      // Scale outward from center
      return {
        x: cx + (bx - cx) * scaleFactor,
        y: cy + (by - cy) * scaleFactor
      };
    }

    const particles = [];

    function resize() {
      width  = canvas.width  = canvas.offsetWidth  || 800;
      height = canvas.height = canvas.offsetHeight || 600;
      particles.forEach(p => {
        const pt = getBasePos(p.ptIdx, p.scaleFactor);
        p.originX = pt.x;
        p.originY = pt.y;
        p.x = pt.x;
        p.y = pt.y;
      });
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      mouse.x = e.clientX - r.left;
      mouse.y = e.clientY - r.top;
    });
    window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

    class Particle {
      constructor(ptIdx, setIdx) {
        this.ptIdx       = ptIdx;
        this.scaleFactor = SETS[setIdx][0];
        this.dotSize     = SETS[setIdx][1];
        this.opacity     = SETS[setIdx][2];
        this.vx = 0; this.vy = 0;
        this.z = (Math.random() - 0.5) * 15;
        const pt = getBasePos(ptIdx, this.scaleFactor);
        this.x = this.originX = pt.x;
        this.y = this.originY = pt.y;
      }
      update(dt) {
        if (mouse.x !== null) {
          const sc = fov / (fov + this.z);
          const cx = width/2, cy = height/2;
          const sx = cx + (this.x - cx) * sc;
          const sy = cy + (this.y - cy) * sc;
          const dx = sx - mouse.x, dy = sy - mouse.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < repelRadius*repelRadius && d2 > 0) {
            const d = Math.sqrt(d2);
            const f = ((repelRadius - d) / repelRadius) * repelStrength;
            this.vx += (dx/d) * f;
            this.vy += (dy/d) * f;
          }
        }

        // Snap back
        this.vx += (this.originX - this.x) * 0.14;
        this.vy += (this.originY - this.y) * 0.14;

        this.x += this.vx * dt;
        this.y += this.vy * dt;

        this.vx *= 0.72;
        this.vy *= 0.72;
      }
      draw() {
        if (this.opacity === 0) return;
        const sc = fov / (fov + this.z);
        const cx = width/2, cy = height/2;
        const sx = cx + (this.x - cx) * sc;
        const sy = cy + (this.y - cy) * sc;
        ctx.globalAlpha = this.opacity;
        ctx.beginPath();
        ctx.arc(sx, sy, this.dotSize * sc, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    width  = canvas.width  = canvas.offsetWidth  || 800;
    height = canvas.height = canvas.offsetHeight || 600;

    // Draw back to front: set 8 first (biggest, most transparent), set 0 last
    for (let s = SETS.length - 1; s >= 0; s--) {
      for (let i = 0; i < OUTLINE_POINTS.length; i++) {
        particles.push(new Particle(i, s));
      }
    }

    let lastTime = 0;
    function animate(time) {
      if (!lastTime) lastTime = time;
      const dt = Math.min((time - lastTime) / 16.666, 3);
      lastTime = time;
      ctx.clearRect(0, 0, width, height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update(dt);
        particles[i].draw();
      }
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
